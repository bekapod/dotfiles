# set true colour
set-option -sa terminal-overrides ",xterm*:Tc"

# set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# start windows at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g mouse on

set -s escape-time 50

set -g default-terminal "tmux-256color"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g mode-style "fg=#9ccfd8,bg=#393552"

set -g message-style "fg=#9ccfd8,bg=#393552"
set -g message-command-style "fg=#9ccfd8,bg=#393552"

set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#9ccfd8"

set -g status "on"
set -g status-justify "left"

set -g status-style "fg=#9ccfd8,bg=#232136"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#232136,bg=#9ccfd8,bold] #S #[fg=#9ccfd8,bg=#232136,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#232136,bg=#232136,nobold,nounderscore,noitalics]#[fg=#9ccfd8,bg=#232136] #{prefix_highlight} #[fg=#393552,bg=#232136,nobold,nounderscore,noitalics]#[fg=#9ccfd8,bg=#393552] %Y-%m-%d  %I:%M %p #[fg=#9ccfd8,bg=#393552,nobold,nounderscore,noitalics]#[fg=#232136,bg=#9ccfd8,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#232136,bg=#232136,nobold,nounderscore,noitalics]#[fg=#9ccfd8,bg=#232136] #{prefix_highlight} #[fg=#393552,bg=#232136,nobold,nounderscore,noitalics]#[fg=#9ccfd8,bg=#393552] %Y-%m-%d  %H:%M #[fg=#9ccfd8,bg=#393552,nobold,nounderscore,noitalics]#[fg=#232136,bg=#9ccfd8,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#908caa,bg=#232136"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#908caa,bg=#232136"
setw -g window-status-format "#[fg=#232136,bg=#232136,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#232136,bg=#232136,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#232136,bg=#393552,nobold,nounderscore,noitalics]#[fg=#9ccfd8,bg=#393552,bold] #I  #W #F #[fg=#393552,bg=#232136,nobold,nounderscore,noitalics]"

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#f6c177]#[bg=#232136]#[fg=#232136]#[bg=#f6c177]"
set -g @prefix_highlight_output_suffix ""

# set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# open panes in cwd
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

run '~/.tmux/plugins/tpm/tpm'
