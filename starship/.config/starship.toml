palette = "rose-pine"
command_timeout = 3000
format = """
$directory\
$git_branch\
$git_state\
$git_status\
$elixir\
$golang\
$nodejs\
$python\
$rust\
$kubernetes\
$aws\
$gcloud\
$cmd_duration\
$line_break\
$character\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

[character]
success_symbol = "[[п”ӣ](yellow) п„…](subtext0)"
error_symbol = "[[уұҮҺ](red) п„…](subtext0)"

[directory]
truncation_length = 4
truncation_symbol = ".../"
style = "bold magenta"
format = "[$path ]($style)"

[aws]
symbol = "у°ёҸ"
style = "fg:red"
format = '[ $symbol $profile ]($style)'

[cmd_duration]
format = "[ $duration]($style) "
style = "subtext0"

[elixir]
symbol = "оүө "
style = "fg:magenta"
format = '[ $symbol ($version) ]($style)'

[gcloud]
symbol = "уұҮ¶"
style = "fg:cyan"
format = "[ $symbol ($project) ]($style)"

[git_branch]
symbol = "пҗҳ"
style = "fg:foreground"
format = '[ $symbol $branch ]($style)'

[git_status]
format = "[ [(*$conflicted$untracked$modified$staged$renamed$deleted) ](218)($ahead_behind$stashed)]($style)"
style = "fg:foreground"
conflicted = "вҖӢ"
untracked = "вҖӢ"
modified = "вҖӢ"
staged = "вҖӢ"
renamed = "вҖӢ"
deleted = "вҖӢ"
stashed = "вүЎ"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'
style = "fg:foreground"

[golang]
symbol = "оҳ§ "
style = "fg:cyan"
format = '[ $symbol ($version) ]($style)'

[kubernetes]
symbol = "уұғҫ"
style = "fg:cyan"
format = '[ $symbol $context( \($namespace\)) ]($style)'
disabled = false

[nodejs]
symbol = "оңҳ"
style = "fg:green"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = "оңј"
style = "fg:yellow"
format = '[ $symbol ($version) \(($virtualenv)\) ]($style)'

[rust]
symbol = "оһЁ"
style = "fg:red"
format = '[ $symbol ($version) ]($style)'

[palettes.rose-pine]
black = '#393552'
red = '#eb6f92'
green = '#3e8fb0'
yellow = '#f6c177'
blue = '#3e8fb0'
magenta = '#c4a7e7'
cyan = '#9ccfd8'
white = '#e0def4'
